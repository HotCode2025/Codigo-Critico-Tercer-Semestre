<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piedra, Papel y Tijera</title>
    <script>
        // FUNCION PROPUESTA TAREA.
        function aleatorio(min, max) { // Funcion para generar numeros aleatorios
            return Math.floor(Math.random() * (max - min + 1) + min)
}

        //TAREA Crear funcion que sirva para todo. llamo funcion con parametros y en argumentos le coloco los numeros que necesito y tenga numeros aleatorios
       // 1 será piedra 2 será papel 3 será tijera
       let jugador = 0
       let max = 3
       let min = 1
       let pc = aleatorio(1,3)

       // PRIMERO: Me pregunta a mi primero
       
       jugador = prompt("Elige : 1 piedra, 2 papel, 3 tijera")

       // SEGUNDO: Cuenta que debo elegir

       //alert("Elige jugador" + jugador)
       if(jugador == 1){
            alert("Elegiste piedra")
       } else if(jugador == 2){
            alert("Elegiste papel")
       }else if(jugador == 3){
            alert("Elegiste tijera")
       } else{
            alert("Elegiste perder")
       }

       // TERCERO: Recien ahora muestra que elige la PC 
       alert("La PC elegió:  " + pc);

       // CUARTO: Combate final
       if(pc == jugador){
            alert("EMPATE!!!")
       } else if(jugador == 1 && pc == 3){
            alert("GANASTE!!!")
       } else if(jugador == 2 && pc == 1){
            alert("GANASTE!!!")
       } else if(jugador == 3 && pc == 2){
            alert("GANASTE!!!")
       } else{
            alert("PERDISTE!!!")
       }
    </script>
</head>
<body>
    <h1>Piedra, Papel y Tijera</h1>
</body>
</html>
